<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chat</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🤖 AI Chat</h2>
  <button class="new-chat">+ New Chat</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CHAT -->
  <div id="chatBox" class="chat-box">
    <div class="message bot-message">
      <div class="msg-container">
        <img src="/static/bot.png">
        <div>Hello! How can I help you today?</div>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <input id="input" type="text" placeholder="Message AI...">
    <button id="sendBtn">Send</button>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const input = document.getElementById("input");
  const chatBox = document.getElementById("chatBox");
  const newChatBtn = document.querySelector(".new-chat");
  const sendBtn = document.getElementById("sendBtn");

  // ✅ ENTER KEY
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      e.preventDefault();
      sendMessage();
    }
  });

  // ✅ BUTTON CLICK
  sendBtn.addEventListener("click", sendMessage);

  // ✅ NEW CHAT
  newChatBtn.addEventListener("click", function() {
    chatBox.innerHTML = `
      <div class="message bot-message">
        <div class="msg-container">
          <img src="/static/bot.png">
          <div>Hello! How can I help you today?</div>
        </div>
      </div>
    `;
  });

  // ✅ SCROLL FUNCTION
  function scrollBottom() {
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // ✅ TYPING EFFECT
  function typeText(element, text, speed = 20) {
    element.innerHTML = "";
    let i = 0;

    function typing() {
      if (i < text.length) {
        element.innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, speed);
      }
    }
    typing();
  }

  // ✅ SEND MESSAGE
  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    // USER MESSAGE
    const userMsg = document.createElement("div");
    userMsg.className = "message user-message";
    userMsg.innerText = text;
    chatBox.appendChild(userMsg);

    input.value = "";
    scrollBottom();

    // API CALL
    fetch("https://chatbot-project-yzem.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {

      const botMsg = document.createElement("div");
      botMsg.className = "message bot-message";

      const container = document.createElement("div");
      container.className = "msg-container";

      const img = document.createElement("img");
      img.src = "/static/bot.png";

      const textDiv = document.createElement("div");

      container.appendChild(img);
      container.appendChild(textDiv);
      botMsg.appendChild(container);
      chatBox.appendChild(botMsg);

      typeText(textDiv, data.reply);
      scrollBottom();
    })
    .catch(err => {
      console.error(err);

      const errMsg = document.createElement("div");
      errMsg.className = "message bot-message";
      errMsg.innerHTML = `
        <div class="msg-container">
          <img src="/static/bot.png">
          <div>⚠️ Error connecting server</div>
        </div>
      `;
      chatBox.appendChild(errMsg);
    });
  }

});
</script>

</body>
</html>
