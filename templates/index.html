<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chat</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🤖 AI Chat</h2>
  <button class="new-chat">+ New Chat</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CHAT -->
  <div id="chatBox" class="chat-box">
    <div class="message bot-message">
      <div class="msg-container">
        <img src="/static/bot.png">
        <div>Hello! How can I help you today?</div>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <input id="input" type="text" placeholder="Message AI...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
    const input = document.getElementById("input");
const chatBox = document.getElementById("chatBox");

// ENTER KEY
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

// NEW CHAT BUTTON
document.querySelector(".new-chat").addEventListener("click", () => {
  chatBox.innerHTML = `
    <div class="message bot-message">
      <div class="msg-container">
        <img src="/static/bot.png">
        <div>Hello! How can I help you today?</div>
      </div>
    </div>
  `;
});

// SEND MESSAGE
function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  // USER MSG
  const userMsg = document.createElement("div");
  userMsg.className = "message user-message";
  userMsg.innerText = text;
  chatBox.appendChild(userMsg);

  input.value = "";
  scrollBottom();

  // LOADER
  const loader = document.createElement("div");
  loader.className = "typing";
  loader.innerHTML = "<span></span><span></span><span></span>";
  chatBox.appendChild(loader);

  scrollBottom();

  // API CALL
  fetch("http://127.0.0.1:5000/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: text })
  })
  .then(res => res.json())
  .then(data => {
    loader.remove();

    const botMsg = document.createElement("div");
    botMsg.className = "message bot-message";

    const container = document.createElement("div");
    container.className = "msg-container";

    const img = document.createElement("img");
    img.src = "/static/bot.png";

    const textDiv = document.createElement("div");

    container.appendChild(img);
    container.appendChild(textDiv);
    botMsg.appendChild(container);
    chatBox.appendChild(botMsg);

    typeText(textDiv, data.reply);
    scrollBottom();
  })
  .catch(() => {
    loader.remove();

    const err = document.createElement("div");
    err.className = "message bot-message";
    err.innerHTML = `
      <div class="msg-container">
        <img src="bot.png">
        <div>⚠️ AI server not running</div>
      </div>
    `;
    chatBox.appendChild(err);
  });
}

// TYPING EFFECT
function typeText(element, text, speed = 20) {
  element.innerHTML = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

// SCROLL
function scrollBottom() {
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
